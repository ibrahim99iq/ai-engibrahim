<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام التقارير اليومية - شركة الداودي</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="header">
    <h1>📊 نظام عرض التقارير اليومية</h1>
    <p>شركة الداودي للخدمات النفطية وإنتاج الأسفلت المؤكسد</p>
</div>

<div class="container">

    <div class="controls">
        <input type="date" id="reportDate">
        <button class="btn-primary" onclick="loadReport()">عرض التقرير</button>
        <button class="btn-secondary" onclick="openInNewTab()">فتح بنافذة مستقلة</button>
    </div>

    <div id="message" class="message"></div>

    <iframe id="reportFrame"></iframe>

</div>

<div class="footer">
    <div class="designer">
        تصميم وبرمجة <strong>المهندس إبراهيم الخفاف</strong>
    </div>
    <div class="rights">
        © 2026 جميع الحقوق محفوظة - شركة الداودي
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
