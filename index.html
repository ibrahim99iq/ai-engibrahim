<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام التقارير اليومية</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Tahoma, Arial;
    direction:rtl;
    background:#f1f4f9;
}

/* Header */
.header{
    background:#1e293b;
    color:white;
    padding:18px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* Card */
.container{
    width:95%;
    max-width:1100px;
    margin:25px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* Controls */
.controls{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

input[type="date"]{
    padding:10px;
    font-size:15px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:10px 16px;
    font-size:15px;
    border-radius:6px;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.btn-primary{
    background:#2563eb;
    color:white;
}

.btn-secondary{
    background:#10b981;
    color:white;
}

button:hover{
    opacity:0.9;
}

/* Message */
.message{
    text-align:center;
    margin-top:12px;
    color:#dc2626;
    font-weight:bold;
}

/* PDF Frame */
iframe{
    width:100%;
    height:75vh;
    margin-top:20px;
    border:none;
    border-radius:8px;
}

/* Mobile improvements */
@media(max-width:600px){

    .header{
        font-size:16px;
        padding:14px;
    }

    .container{
        padding:15px;
    }

    iframe{
        height:65vh;
    }

}

</style>
</head>

<body>

<div class="header">
📊 نظام عرض التقارير اليومية - شركة الداودي
</div>

<div class="container">

    <div class="controls">
        <input type="date" id="reportDate">
        <button class="btn-primary" onclick="loadReport()">عرض التقرير</button>
        <button class="btn-secondary" onclick="openInNewTab()">فتح بنافذة جديدة</button>
    </div>

    <div id="message" class="message"></div>

    <iframe id="reportFrame"></iframe>

</div>

<script>

function loadReport(){

    const dateValue=document.getElementById("reportDate").value;
    const message=document.getElementById("message");
    const frame=document.getElementById("reportFrame");

    message.innerText="";
    frame.src="";

    if(!dateValue){
        message.innerText="يرجى اختيار تاريخ أولاً";
        return;
    }

    const filePath="history_images/"+dateValue+".pdf";

    fetch(filePath,{method:"HEAD"})
    .then(response=>{
        if(response.ok){
            frame.src=filePath;
        }else{
            message.innerText="لا يوجد تقرير لهذا التاريخ";
        }
    })
    .catch(()=>{
        message.innerText="لا يوجد تقرير لهذا التاريخ";
    });

}

function openInNewTab(){

    const dateValue=document.getElementById("reportDate").value;

    if(!dateValue){
        alert("اختر تاريخ أولاً");
        return;
    }

    const filePath="history_images/"+dateValue+".pdf";
    window.open(filePath,"_blank");

}

</script>

</body>
</html>
