<script>
async function ask() {
  const question = document.getElementById("q").value.trim();
  const output = document.getElementById("out");

  if (!question) {
    output.textContent = "اكتب سؤال أولاً 🙂";
    return;
  }

  try {
    const response = await fetch("api.json");
    const data = await response.json();

    if (question.includes("اليوم") || question.includes("مجموع")) {
      output.textContent =
        "تاريخ: " + data.date + " | المجموع: " + data.total;
    } else if (question.includes("سيارات")) {
      output.textContent =
        "عدد السيارات بتاريخ " + data.date + " هو: " + data.cars;
    } else {
      output.textContent =
        "عندي بيانات بتاريخ " + data.date + " والمجموع " + data.total;
    }

  } catch (error) {
    output.textContent = "صار خطأ بقراءة البيانات ❌";
  }
}
</script>
