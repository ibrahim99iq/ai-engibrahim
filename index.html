<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقارير شركة الداودي</title>

<style>
body {
    margin: 0;
    font-family: Tahoma, Arial;
    background: #f4f6f9;
    direction: rtl;
    text-align: center;
}

header {
    background: #1e2a38;
    color: white;
    padding: 20px;
    font-size: 22px;
}

.container {
    width: 95%;
    max-width: 1200px;
    margin: 30px auto;
}

.controls {
    margin-bottom: 20px;
}

input[type="date"] {
    padding: 10px;
    font-size: 16px;
}

button {
    padding: 10px 18px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 5px;
    margin-right: 5px;
}

button:hover {
    background: #0056b3;
}

.message {
    margin-top: 15px;
    font-weight: bold;
    color: red;
}

iframe {
    width: 100%;
    height: 900px;
    border: none;
    margin-top: 20px;
    background: white;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

footer {
    margin-top: 40px;
    padding: 20px;
    background: #1e2a38;
    color: white;
}
</style>
</head>

<body>

<header>
    نظام عرض التقارير اليومية - شركة الداودي
</header>

<div class="container">

    <div class="controls">
        <input type="date" id="reportDate">
        <button onclick="loadReport()">عرض التقرير</button>
        <button onclick="openInNewTab()">فتح بصفحة مستقلة</button>
    </div>

    <div id="message" class="message"></div>

    <iframe id="reportFrame"></iframe>

</div>

<footer>
    جميع الحقوق محفوظة © 2026
</footer>

<script>

function loadReport() {

    const dateValue = document.getElementById("reportDate").value;
    const message = document.getElementById("message");
    const frame = document.getElementById("reportFrame");

    message.innerText = "";
    frame.src = "";

    if (!dateValue) {
        message.innerText = "يرجى اختيار تاريخ أولاً";
        return;
    }

    const filePath = "history_images/" + dateValue + ".pdf";

    fetch(filePath, { method: "HEAD" })
        .then(response => {
            if (response.ok) {
                frame.src = filePath;
            } else {
                message.innerText = "لا يوجد تقرير لهذا التاريخ";
            }
        })
        .catch(() => {
            message.innerText = "لا يوجد تقرير لهذا التاريخ";
        });
}

function openInNewTab() {
    const dateValue = document.getElementById("reportDate").value;
    if (!dateValue) {
        alert("اختر تاريخ أولاً");
        return;
    }

    const filePath = "history_images/" + dateValue + ".pdf";
    window.open(filePath, "_blank");
}

</script>

</body>
</html>
